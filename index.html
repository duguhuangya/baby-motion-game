<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>宝宝体感游戏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // RAF polyfill for headless/CDP browsers where requestAnimationFrame doesn't fire
    // Uses setTimeout chain (not setInterval) to avoid infinite loop
    if (!window.__rafPatched) {
      const origRAF = window.requestAnimationFrame.bind(window);
      const origCAF = window.cancelAnimationFrame.bind(window);
      let nextId = 1;
      const pending = new Map();

      function fireFrame() {
        const now = performance.now();
        // Snapshot and clear — callbacks may re-register via rAF which goes to next cycle
        const batch = new Map(pending);
        pending.clear();
        for (const [id, cb] of batch) {
          try { cb(now); } catch(e) {}
        }
        if (pending.size > 0) {
          setTimeout(fireFrame, 16);
        }
      }

      window.requestAnimationFrame = function(cb) {
        const id = nextId++;
        const wasEmpty = pending.size === 0;
        pending.set(id, cb);
        if (wasEmpty) {
          setTimeout(fireFrame, 16);
        }
        return id;
      };

      window.cancelAnimationFrame = function(id) {
        pending.delete(id);
      };

      window.__rafPatched = true;
    }
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
